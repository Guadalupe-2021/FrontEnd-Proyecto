<div class="search-guardia-container">
    <fieldset>
      <div class="input-group">
        <span class="input-group-text" id="basic-addon1">
          <i class="bi bi-search search-icon"></i>
        </span>
        <input type="text" class="form-control" (focus)="buscar($event)"
         placeholder="Buscar guardia..." (keyup)="buscar($event)">
      </div>
    </fieldset>
    <div class="guardias-container">
      <div class="guardia" *ngFor="let guardia of guardias_html" (click)="select(guardia)"
      [innerHTML]="guardia" title="Seleccionar">
      </div>
    </div>
</div>
